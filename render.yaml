services:
  # Backend Web Service
  - type: web
    name: stock-monitoring-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.12"

  # Frontend Static Site
  - type: web
    name: stock-monitoring-frontend
    runtime: static
    buildCommand: npm install && npm run build
    # Directory to publish, relative to the REPO ROOT
    staticPublishPath: frontend/dist
    rootDir: frontend
    routes:
      - type: rewrite
        source: /**
        destination: /index.html
