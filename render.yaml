services:
  # Backend Web Service
  - type: web
    name: stock-monitoring-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.12"

  # Frontend Static Site
  - type: web
    name: stock-monitoring-frontend
    runtime: static
    # Remove rootDir to avoid ambiguity
    # rootDir: frontend
    
    # Explicitly cd into directory for build
    buildCommand: cd frontend && npm install && npm run build
    
    # Explicitly point to artifact from repo root
    staticPublishPath: frontend/dist
    
    routes:
      - type: rewrite
        source: /**
        destination: /index.html
