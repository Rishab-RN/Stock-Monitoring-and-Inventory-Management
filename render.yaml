services:
  # Backend Web Service
  - type: web
    name: stock-monitoring-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.12"

  # Frontend Static Site
  - type: web
    name: stock-monitoring-frontend
    runtime: static
    # Use standard rootDir configuration
    rootDir: frontend
    
    # Build command runs relative to rootDir
    buildCommand: npm install && npm run build
    
    # Artifact path relative to rootDir
    staticPublishPath: ./dist
    
    routes:
      - type: rewrite
        source: /**
        destination: /index.html
