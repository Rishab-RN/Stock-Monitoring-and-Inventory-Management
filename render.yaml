services:
  # Backend Web Service
  - type: web
    name: stock-monitoring-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Use Python 3.10 as it's stable and compatible with most modern libs
      - key: PYTHON_VERSION
        value: 3.10.12

  # Frontend Static Site
  - type: static
    name: stock-monitoring-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    root: frontend
    routes:
      # Rewrites all routes to index.html to support React Router (SPA)
      - type: rewrite
        source: /**
        destination: /index.html
