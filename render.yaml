services:
  # Backend Web Service
  - type: web
    name: stock-monitoring-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12

# Frontend Static Site
# Note: Static sites must be defined in a separate 'staticSites' list, not under 'services'
staticSites:
  - name: stock-monitoring-frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    root: frontend
    routes:
      - type: rewrite
        source: /**
        destination: /index.html
